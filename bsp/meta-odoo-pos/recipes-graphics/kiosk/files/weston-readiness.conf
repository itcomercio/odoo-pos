[Unit]
Wants=seatd.service
After=seatd.service systemd-udev-trigger.service

[Service]
Restart=on-failure
RestartSec=2
ExecStartPre=/bin/sh -c 'for i in $(seq 1 100); do if [ -S /run/seatd.sock ] && ls /dev/dri/card* >/dev/null 2>&1 && ls /dev/input/event* >/dev/null 2>&1; then exit 0; fi; sleep 0.2; done; echo "weston readiness timeout: seatd/DRM/input not ready" >&2; exit 1'

