# Systemd drop-in for weston.service
# Forces a stable, known XDG_RUNTIME_DIR so that both Weston and the
# kiosk launcher agree on where the Wayland socket lives (/run/wayland-0).
[Unit]
# run-postinsts.service runs post-install scripts on first boot
# (fontconfig cache, ldconfig, gtk module registration, etc.).
# These are memory-intensive and run concurrently with Weston by default,
# which causes OOM pressure or a daemon-reload that kills the graphical
# environment on first boot.  Declaring After= here ensures Weston only
# starts once all post-install work is done.  On subsequent boots
# run-postinsts exits immediately, so there is no added delay.
# Also delay Weston until first-boot DB init has completed and the
# multi-user boot phase is reached, so graphics starts as late as possible.
Wants=run-postinsts.service postgresql-initdb.service
After=run-postinsts.service postgresql-initdb.service postgresql.service multi-user.target

[Service]
Environment=XDG_RUNTIME_DIR=/run
ExecStartPre=/bin/mkdir -p /run

