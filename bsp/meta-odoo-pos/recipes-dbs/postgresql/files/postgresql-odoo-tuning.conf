# =============================================================================
# PostgreSQL tuning for Odoo POS
# Official recommendations: https://www.odoo.com/documentation/deploy
#
# This file is installed by postgresql-initdb.sh into:
#   /var/lib/postgresql/data/conf.d/odoo-tuning.conf
# and loaded via:
#   include_dir = 'conf.d'   (appended to postgresql.conf by initdb script)
# =============================================================================

# -----------------------------------------------------------------------------
# Connections
# Odoo workers=0 (multi-thread) needs few DB connections.
# Formula: (workers * 6) + extra_tools + 1
# -----------------------------------------------------------------------------
max_connections = 50

# -----------------------------------------------------------------------------
# Memory
# Sized conservatively for an embedded POS system (2-4 GB RAM).
# shared_buffers  ~25% RAM, effective_cache_size ~75% RAM.
# work_mem        per sort/hash operation (Odoo generates complex queries).
# -----------------------------------------------------------------------------
shared_buffers            = 256MB
effective_cache_size      = 768MB
work_mem                  = 16MB
maintenance_work_mem      = 64MB

# -----------------------------------------------------------------------------
# WAL / Checkpoint
# Larger WAL size reduces checkpoint pressure; completion_target spreads I/O.
# -----------------------------------------------------------------------------
wal_buffers                    = 16MB
min_wal_size                   = 256MB
max_wal_size                   = 1GB
checkpoint_completion_target   = 0.9

# -----------------------------------------------------------------------------
# Query planner
# Optimised for virtio-blk / SSD storage (as used under QEMU and typical POS
# hardware). Adjust random_page_cost = 4.0 for spinning HDDs.
# -----------------------------------------------------------------------------
default_statistics_target = 100
random_page_cost          = 1.1
effective_io_concurrency  = 200

# -----------------------------------------------------------------------------
# Parallelism
# Keep low on embedded hardware to avoid CPU saturation under Odoo load.
# -----------------------------------------------------------------------------
max_worker_processes                = 4
max_parallel_workers                = 4
max_parallel_workers_per_gather     = 2
max_parallel_maintenance_workers    = 2

# -----------------------------------------------------------------------------
# Reliability vs Performance
# synchronous_commit=off: transactions acknowledge before WAL flush to disk.
# Safe for Odoo POS: a power-loss may lose the last ~0.6 s of commits, but
# Odoo's retry logic and the WAL replayer will keep the DB consistent.
# Set to 'on' if you need full durability guarantees.
# -----------------------------------------------------------------------------
synchronous_commit = off

# -----------------------------------------------------------------------------
# Logging (diagnostics)
# Log queries taking longer than 2 s to help identify slow Odoo operations.
# Set to -1 to disable.
# -----------------------------------------------------------------------------
log_min_duration_statement = 2000

