# USB Printer (usblp) support - required for thermal receipt printers
# Used in Odoo POS for receipt printing via USB thermal printers

# Core USB support - enable if not already present
CONFIG_USB=y
CONFIG_USB_COMMON=y

# USB Host Controller support (needed for most systems)
CONFIG_USB_XHCI_HCD=y
CONFIG_USB_EHCI_HCD=y
CONFIG_USB_UHCI_HCD=y
CONFIG_USB_OHCI_HCD=y

# USB Printer class driver (bidirectional, required for thermal printers)
CONFIG_USB_PRINTER=y

# USB device filesystem (allows direct USB device access if needed)
CONFIG_USB_DEVICE_CLASS=y

# HIDRAW support (for HID-class USB devices as fallback)
CONFIG_HIDRAW=y

# usbfs support
CONFIG_USB_FS=y

