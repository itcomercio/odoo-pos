# VGA / framebuffer console support built-in (not as modules)
# Required so the kernel can drive the VGA console in QEMU and real hardware
# without relying on modules that may not be present in the installer initrd.

# Virtual Terminal support
CONFIG_VT=y
CONFIG_VT_CONSOLE=y
CONFIG_VGA_CONSOLE=y

# Framebuffer console
CONFIG_FB=y
CONFIG_FRAMEBUFFER_CONSOLE=y
CONFIG_FRAMEBUFFER_CONSOLE_DETECT_PRIMARY=y

# Simple framebuffer (needed by simpledrm / EFI framebuffer handoff)
CONFIG_SYSFB_SIMPLEFB=y

# Simple DRM driver - handles the firmware/EFI framebuffer that Limine leaves
CONFIG_DRM_SIMPLEDRM=y

# Bochs DRM - the display adapter QEMU exposes by default; built-in so
# the installer initrd (which carries no modules) can use VGA.
CONFIG_DRM_BOCHS=y

# Serial console - keep built-in so both VGA and serial work simultaneously
CONFIG_SERIAL_8250_CONSOLE=y

