# Podman engine configuration for Odoo POS embedded system.
#
# This system has no internet access. Container images are loaded
# from a pre-built tar at first boot only.
#
# Key change: redirect image copy temporary files away from /var/tmp
# (tmpfs, RAM-backed) to a persistent path on disk. Without this,
# podman load of large images fails with "no space left on device"
# on embedded systems.

[engine]
image_copy_tmp_dir = "/var/lib/containers/tmp"

