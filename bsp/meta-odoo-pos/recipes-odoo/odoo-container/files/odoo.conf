[options]
; Host PostgreSQL on same machine.
db_host = 127.0.0.1
db_port = 5432
db_user = odoo
db_password = odoo
db_name = odoo

http_port = 8069
http_interface = 0.0.0.0

; Odoo filestore and runtime data path inside container.
data_dir = /var/lib/odoo

logfile = /var/lib/odoo/log/odoo.log
logrotate = True
log_level = info

workers = 0
admin_passwd = miadminpasswordodoo
without_demo = True

