[options]
; ── Database connection ─────────────────────────────────────────────────────
; PostgreSQL runs locally on the same machine.
db_host = 127.0.0.1
db_port = 5432
db_user = odoo
db_password = odoo
db_name = odoo

; ── Network ─────────────────────────────────────────────────────────────────
http_port = 8069
; Bind only to localhost; Weston/Chromium kiosk connects via loopback.
http_interface = 0.0.0.0

; ── Paths ───────────────────────────────────────────────────────────────────
; Main addons shipped with Odoo.
addons_path = /opt/odoo/addons
; Log file (the odoo user must be able to write here).
logfile = /var/lib/odoo/log/odoo.log
logrotate = True
log_level = info

; ── Workers (single-process mode for embedded / kiosk use) ──────────────────
; 0 = single threaded, suitable for a dedicated POS appliance.
workers = 0

; ── Security ────────────────────────────────────────────────────────────────
; Master password used by /web/database/* endpoints.
admin_passwd = miadminpasswordodoo

; ── Demo data ───────────────────────────────────────────────────────────────
without_demo = True

