# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "odoo-pos"
BBFILE_PATTERN_odoo-pos = "^${LAYERDIR}/"
BBFILE_PRIORITY_odoo-pos = "6"

LAYERDEPENDS_odoo-pos = "core"
LAYERSERIES_COMPAT_odoo-pos = "wrynose"
